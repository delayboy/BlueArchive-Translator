name: Remote SSH Control
on:
  workflow_dispatch:

jobs:
  ssh-access:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          echo "root:admin" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo service ssh start

      - name: Run Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          cloudflared tunnel --url tcp://localhost:22 > cloudflare.log 2>&1 &
          
          echo "正在等待 Cloudflare 生成域名..."
          for i in {1..15}; do
            DOMAIN=$(grep -oE "[a-zA-Z0-9-]+\.trycloudflare\.com" cloudflare.log | head -n 1)
            if [ ! -z "$DOMAIN" ]; then
              echo "================================================="
              echo "临时 SSH 地址: $DOMAIN"
              echo "Termux 连接命令："
              echo "ssh -o ProxyCommand=\"cloudflared access tcp --hostname %h\" root@$DOMAIN"
              echo "SFTP命令："
              echo "cloudflared access tcp --hostname $DOMAIN --listener 127.0.0.1:8888"
              echo "密码："
              echo "admin"
              echo "================================================="
              echo $DOMAIN > cf_domain.txt
              break
            fi
            sleep 2
          done
          
          if [ ! -f cf_domain.txt ]; then
            echo "错误：未能获取到域名，请重启流程。"
            cat cloudflare.log
            exit 1
          fi

      - name: Keep Alive
        run: sleep 21600
