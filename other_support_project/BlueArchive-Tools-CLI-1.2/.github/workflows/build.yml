name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: osx-x64
          - os: macos-latest
            platform: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build SpineSkeletonDataConverter
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/wang606/SpineSkeletonDataConverter.git
          cd SpineSkeletonDataConverter
          mkdir build && cd build
          cmake ..
          cmake --build . --config Release

      - name: Publish
        run: dotnet publish BlueArchiveTools.CLI -c Release -r ${{ matrix.platform }} --self-contained true /p:PublishTrimmed=false -o ./publish

      - name: Copy Extra Binaries
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cp SpineSkeletonDataConverter/build/SpineSkeletonDataConverter* ./publish/
          cp SpineSkeletonDataConverter/build/SpineAtlasDowngrade* ./publish/

      - name: Zip Artifact
        shell: bash
        run: |
          cd ./publish
          7z a ../BlueArchiveTools.${{ matrix.platform }}.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlueArchiveTools.${{ matrix.platform }}
          path: BlueArchiveTools.${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
